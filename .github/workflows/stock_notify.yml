name: Stock News Monitor

on:
  schedule:
    - cron: '0 * * * *'        # Every hour for alerts
    - cron: '0 23 * * *'       # Every day 8:00 AM JST (23:00 UTC) for summary
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - summary

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine execution flag
        id: flags
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "${{ github.event.schedule }}" == "0 23 * * 0" ]]; then
            echo "mode=--summary" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.mode }}" == "summary" ]]; then
            echo "mode=--summary" >> $GITHUB_OUTPUT
          else
            echo "mode=" >> $GITHUB_OUTPUT
          fi

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python stock_monitor.py ${{ steps.flags.outputs.mode }}

      - name: Commit and push state
        if: steps.flags.outputs.mode == ''
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add -f last_notified.json
          git commit -m "Update last notified state [skip ci]" || echo "No changes to commit"
          git push
